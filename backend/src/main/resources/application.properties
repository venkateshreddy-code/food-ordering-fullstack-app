spring.application.name=FoodApp
server.port=8091

## MYSQL PRODUCTION CONNECTION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

secreteJwtString=${JWT_SECRET}

# MAIL CONFIGURATION
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

## AWS CONFIG
aws.s3.region=us-east-1
aws.s3.bucket=food-app-devs
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_ACCESS_KEY}

# FRONTEND URLS
frontend.base.url=${FRONTEND_BASE_URL}
base.payment.link=${BASE_PAYMENT_LINK}

## STRIPE CREDENTIALS
stripe.api.public.key=${STRIPE_PUBLIC_KEY}
stripe.api.secret.key=${STRIPE_SECRET_KEY}